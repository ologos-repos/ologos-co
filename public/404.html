<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ologos</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages serves this file for any unmatched path (e.g. a direct
      // load or refresh on /ventures). It re-encodes the path into a query
      // string and redirects to the SPA root, where the restore script in
      // index.html rewrites the URL back before React Router mounts.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
